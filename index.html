<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SVG EasyMetrics - Bundy Low Poly</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.15/paper-full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1f2937; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #toolbar { background: #111827; padding: 15px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; border-bottom: 2px solid #374151; }
        canvas { flex-grow: 1; background: #f8fafc; cursor: grab; }
        .controls { display: flex; align-items: center; gap: 5px; }
        button { background: #2563eb; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1e40af; }
        input[type="number"] { width: 60px; padding: 5px; border-radius: 4px; border: none; }
        label { font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="fileInput" accept=".svg">
    
    <div class="controls">
        <label>Ratio:</label>
        <input type="number" id="scaleRatio" value="1" step="0.1">
    </div>

    <div class="controls">
        <label>Unité:</label>
        <select id="unitSelect">
            <option value="cm">cm</option>
            <option value="mm">mm</option>
        </select>
    </div>

    <button onclick="processSVG()">Calculer Metrics</button>
    <button onclick="exportPDF()" style="background: #0ea5e9;">Exporter PDF</button>
    <span id="status" style="font-size: 12px; color: #fbbf24;"></span>
</div>

<canvas id="myCanvas" resize></canvas>

<script>
    paper.setup('myCanvas');
    let svgLayer;
    let metricsGroup; // Groupe pour pouvoir effacer les anciens textes

    // 1. Chargement du fichier
    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            if (svgLayer) svgLayer.remove();
            if (metricsGroup) metricsGroup.remove();
            
            svgLayer = paper.project.importSVG(event.target.result, {
                expandShapes: true,
                insert: true
            });
            svgLayer.position = paper.view.center;
            document.getElementById('status').innerText = "SVG Importé. Cliquez sur 'Calculer'.";
        };
        reader.readAsText(file);
    };

    function processSVG() {
        if (!svgLayer) return;
        
        // Nettoyer les anciennes mesures si on reclique
        if (metricsGroup) {
            metricsGroup.remove();
        }
        metricsGroup = new paper.Group();
        
        const ratio = parseFloat(document.getElementById('scaleRatio').value);
        const unit = document.getElementById('unitSelect').value;
        
        // Trouver tous les tracés (lignes et formes)
        const paths = paper.project.getItems({ class: paper.Path });
        
        let shapeCount = 1;
        const processedEdges = new Set(); // Pour éviter les textes en double sur les arêtes partagées

        paths.forEach(path => {
            // On ne traite que les formes géométriques (minimum 3 points pour un triangle)
            if (path.segments && path.segments.length > 2 && path.length > 1) {
                
                // 1. Calculer le VRAI centre (Centroid) de la forme
                let cx = 0, cy = 0;
                path.segments.forEach(seg => {
                    cx += seg.point.x;
                    cy += seg.point.y;
                });
                cx /= path.segments.length;
                cy /= path.segments.length;
                const centroid = new paper.Point(cx, cy);

                // 2. Ajouter le numéro de la pièce au centre
                const centerText = new paper.PointText({
                    point: centroid,
                    content: shapeCount.toString(),
                    fillColor: '#ef4444', // Rouge pour bien distinguer le numéro
                    fontWeight: 'bold',
                    fontSize: 14,
                    justification: 'center'
                });
                // Centrage vertical approximatif
                centerText.position.y += centerText.bounds.height / 4;
                metricsGroup.addChild(centerText);
                shapeCount++;

                // 3. Mesurer chaque arête de cette forme
                path.curves.forEach(curve => {
                    const p1 = curve.point1;
                    const p2 = curve.point2;
                    const midPoint = p1.add(p2).divide(2);
                    
                    // Anti-Superposition : Si une ligne est partagée entre deux triangles, on l'arrondit pour la reconnaître
                    const edgeKey = `${midPoint.x.toFixed(1)},${midPoint.y.toFixed(1)}`;
                    if (processedEdges.has(edgeKey)) return; 
                    processedEdges.add(edgeKey);

                    // Calcul de la longueur
                    const rawLen = p1.getDistance(p2);
                    if (rawLen < 1) return; // Ignorer les micro-lignes invisibles
                    const realLen = (rawLen * ratio / 10).toFixed(1);

                    // 4. Calcul de l'orientation pour écrire "à l'intérieur" de la forme
                    const vector = p2.subtract(p1);
                    let normal = vector.clone();
                    normal.angle += 90; // Vecteur perpendiculaire à la ligne
                    normal = normal.normalize(7); // Décaler le texte de 7 pixels
                    
                    // Vérifier si la normale pointe vers l'extérieur ou l'intérieur
                    const toCentroid = centroid.subtract(midPoint);
                    if (normal.dot(toCentroid) < 0) {
                        normal = normal.multiply(-1); // Inverser pour pointer vers l'intérieur
                    }

                    const textPos = midPoint.add(normal);

                    // Création du texte de la mesure
                    const text = new paper.PointText({
                        point: textPos,
                        content: realLen + unit,
                        fillColor: '#2563eb', // Bleu
                        fontSize: 9,
                        justification: 'center'
                    });
                    
                    // Inclinaison pour suivre la ligne
                    let textAngle = vector.angle;
                    // Retourner le texte s'il est à l'envers
                    if (textAngle > 90 || textAngle < -90) {
                        textAngle += 180;
                    }
                    text.rotate(textAngle, textPos);
                    
                    // Ajustement vertical pour qu'il ne coupe pas la ligne
                    text.position.y += text.bounds.height / 4;
                    
                    metricsGroup.addChild(text);
                });
            }
        });
        
        document.getElementById('status').innerText = "Calcul terminé !";
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const canvas = document.getElementById('myCanvas');
        const imgData = canvas.toDataURL('image/png', 1.0);
        
        const pdf = new jsPDF('l', 'mm', 'a4');
        const width = pdf.internal.pageSize.getWidth();
        const height = pdf.internal.pageSize.getHeight();
        
        pdf.addImage(imgData, 'PNG', 0, 0, width, height);
        pdf.save("Bundy_LowPoly_Metrics.pdf");
    }
</script>

</body>
</html>
